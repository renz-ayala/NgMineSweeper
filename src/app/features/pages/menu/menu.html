<div class="min-h-screen flex flex-col items-center justify-center bg-base-300 p-4 animate-fade-in">
  <div class="card w-full max-w-md bg-base-100 shadow-xl border border-base-200">
    <div class="card-body items-center text-center p-8">

      <div class="flex items-center gap-3 mb-6">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="w-9 h-9 text-error animate-pulse"
        >
          <path d="M12 2a1 1 0 0 1 1 1v1.078a6.982 6.982 0 0 1 4.922 4.922H19a1 1 0 1 1 0 2h-1.012a7.02 7.02 0 0 1 0 2H19a1 1 0 1 1 0 2h-1.078a6.982 6.982 0 0 1-4.922 4.922V21a1 1 0 1 1-2 0v-1.012a7.02 7.02 0 0 1-2-0H9a1 1 0 1 1 0-2h1.078A6.982 6.982 0 0 1 5.156 13H5a1 1 0 1 1 0-2h1.012a7.02 7.02 0 0 1 0-2H5a1 1 0 1 1 0-2h1.078a6.982 6.982 0 0 1 4.922-4.922V3a1 1 0 0 1 1-1zm0 5a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm-2 3.5a1.5 1 0 1 1 3 0 1.5 1 0 0 1-3 0z"/>
        </svg>
        <h1 class="text-4xl font-extrabold tracking-wider bg-linear-to-r from-primary to-secondary bg-clip-text text-transparent">
          NgMineSweeper
        </h1>
      </div>

      <div class="w-full flex flex-col gap-3 mb-8">
        @for (difficulty of gameConfigService.difficulties; track difficulty.level) {
          <button
            type="button"
            (click)="startGame(difficulty)"
            class="btn btn-lg justify-between transition-all duration-200 group">

            <div class="flex flex-col items-start text-left">
              <span class="font-bold text-base">{{ difficulty.level }}</span>
            </div>
          </button>
        }
      </div>
    </div>
  </div>
</div>
