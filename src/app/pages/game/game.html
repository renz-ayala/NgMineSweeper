<div class="flex flex-col gap-1 bg-base-100 p-4 rounded-2xl shadow-md border border-base-300 w-fit mx-auto">
  <div class="flex items-center justify-between w-full px-1 py-2 font-mono font-bold text-xl select-none mb-2">
    <div class="text-error bg-base-300/50 px-3 py-1 rounded border border-base-200 min-w-16.25 text-center">
      💣 {{ minesLeft() | counter }}
    </div>
    <label class="swap swap-flip text-3xl" (click)="resetGame($event)">
      <input type="checkbox" [checked]="isGameOver()"/>
      <div class="swap-on">😈</div>
      <div class="swap-off">😇</div>
    </label>
    <div class="text-warning bg-base-300/50 px-3 py-1 rounded border border-base-200 min-w-16.25 text-center">
      ⏱️ {{ timer() | counter }}
    </div>
  </div>

  @for (row of board(); track $index) {
    <div class="flex gap-1">
      @for (box of row; track (box.row + '-' + box.column)) {
        <button
          (click)="revealBox(box.row, box.column)"
          (contextmenu)="flagBox($event, box.row, box.column)"
          class="w-10 h-10 font-bold text-xs flex items-center justify-center rounded transition-all duration-100 select-none
          {{ box.isRevealed
             ? box.hasMine
               ? 'bg-red-600/20 text-red-500 border border-red-500/40 cursor-default'
               : 'bg-base-300 text-base-content/70 border border-base-200 cursor-default'
             : box.isFlagged
               ? 'bg-blue-500/10 border border-blue-500/30 btn btn-square min-h-0 h-10 w-10 hover:scale-95'
               : 'btn btn-square btn-neutral min-h-0 h-10 w-10 hover:scale-95'
          }}">
          @if (box.isRevealed) {
            @if (box.hasMine) {
              🧨💥
            } @else if (box.minesAround > 0) {
              <span class="{{ getNumberColor(box.minesAround) }}">
                {{ box.minesAround }}
              </span>
            }
          } @else {
            @if (box.isFlagged) {
              <div class="flex items-start h-6 select-none">
                <div class="w-0.75 h-full bg-amber-700 rounded-t shadow-sm"></div>
                <img
                  src="https://flagcdn.com/w40/jp.png"
                  alt="Kamikaze"
                  class="w-5 h-3.5 object-cover rounded-sm shadow border border-black/10 -ml-px mt-px"
                />
              </div>
            }
          }
        </button>
      }
    </div>
  }
</div>
