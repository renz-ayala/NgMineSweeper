<div class="min-h-screen flex flex-col items-center justify-center bg-base-300 p-4 animate-fade-in">
  <div class="card w-full max-w-md bg-base-100 shadow-xl border border-base-200">
    <div class="card-body items-center text-center p-8">

      <div class="flex items-center gap-3 mb-6">
        <span class="text-2xl">💣</span>
        <h1 class="text-4xl font-extrabold tracking-wider bg-linear-to-r from-primary to-secondary bg-clip-text text-transparent">
          NgMineSweeper
        </h1>
      </div>

      <div class="w-full flex flex-col gap-3 mb-8">
        @for (difficulty of gameConfigService.difficulties; track difficulty.level) {
          <button
            type="button"
            (click)="startGame(difficulty)"
            class="btn btn-lg justify-between transition-all duration-200 group">

            <div class="flex flex-col items-start text-left">
              <span class="font-bold text-base">{{ difficulty.level }}</span>
            </div>
          </button>
        }
      </div>
    </div>
  </div>
</div>
