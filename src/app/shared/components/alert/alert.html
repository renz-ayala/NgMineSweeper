@if (alert().show) {
  <div class="toast toast-top justify-items-center md:toast-end sm:right-4 top-2 sm:top-4 left-2 sm:left-auto right-2 w-auto max-w-[calc(100vw-1rem)] z-50 pointer-events-auto">
    <div class="alert shadow-lg flex items-center justify-between gap-3 border w-full sm:w-auto"
         [class.alert-success]="alert().type === 'success'"
         [class.alert-error]="alert().type === 'error'"
         [class.alert-info]="alert().type === 'info'">
      <span class="text-sm sm:text-base break-words max-w-[calc(100vw-5rem)]">{{ alert().message }}</span>
      <button class="btn btn-ghost btn-xs btn-circle shrink-0" (click)="alertService.close()">✕</button>
    </div>
  </div>
}
